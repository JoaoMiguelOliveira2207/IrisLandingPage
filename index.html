<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Círculo Iris Janine</title>
     
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 180px;
            margin-bottom: 60px;
        }

        .welcome-text {
            font-size: 20px;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 35px;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .description {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 60px;
            padding: 0 0px;
        }

        .btn {
            display: inline-block;
            padding: 12px 40px;
            border: 1px solid #000000;
            border-radius: 50px;
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #000000;
            color: #ffffff;
        }

        /* Responsividade adicional para telas muito pequenas */
        @media (max-height: 600px) {
            .logo { margin-bottom: 30px; }
            .welcome-text { margin-bottom: 20px; }
            .brand-name { margin-bottom: 25px; }
            .description { margin-bottom: 30px; }
        }
    </style>
</head>
